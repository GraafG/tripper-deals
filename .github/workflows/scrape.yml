name: Scrape Tripper Deals

on:
  schedule:
    # Every day at 08:00 UTC (09:00 CET winter / 10:00 CEST summer)
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      deploy_only:
        description: 'Skip scraping – redeploy current data/UI only'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    if: ${{ github.event.inputs.deploy_only != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python tripper_scraper.py

      - name: Build price history
        run: python build_history.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ geocache.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update deals $(date -u +%Y-%m-%d)"
            git push
          fi

  deploy:
    needs: scrape
    if: ${{ always() && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest changes
        run: git pull origin main

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
